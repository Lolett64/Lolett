<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOLETT — Login Centré v4</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #FDF5E6;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
  }

  .top-line {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 48px;
    background: linear-gradient(to bottom, #B89547, transparent);
  }

  .card {
    width: 440px;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(27,11,148,0.05);
    border-radius: 16px;
    padding: 48px 44px;
    backdrop-filter: blur(12px);
    box-shadow: 0 8px 40px rgba(27,11,148,0.04);
    position: relative;
    z-index: 1;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    letter-spacing: 0.35em;
    color: #1B0B94;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #1B0B94;
    opacity: 0.45;
    text-align: center;
    margin-bottom: 32px;
    font-weight: 400;
  }

  .separator {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .separator::before, .separator::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(184,149,71,0.25), transparent);
  }
  .separator .diamond {
    width: 5px;
    height: 5px;
    background: rgba(184,149,71,0.4);
    transform: rotate(45deg);
  }

  .title {
    font-family: 'Playfair Display', serif;
    font-size: 30px;
    font-style: italic;
    color: #1B0B94;
    text-align: center;
    margin-bottom: 8px;
    font-weight: 400;
  }

  .subtitle {
    font-size: 12px;
    color: #5a4d3e;
    text-align: center;
    margin-bottom: 32px;
    font-weight: 300;
    letter-spacing: 0.03em;
  }

  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #5a4d3e;
    margin-bottom: 6px;
    font-weight: 500;
    padding-left: 2px;
  }

  .field input {
    width: 100%;
    height: 48px;
    border: 1px solid rgba(27,11,148,0.08);
    border-radius: 8px;
    background: rgba(255,255,255,0.65);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #1a1510;
    text-align: center;
    letter-spacing: 0.04em;
    outline: none;
    transition: all 0.3s;
  }
  .field input:focus {
    border-color: rgba(27,11,148,0.2);
    background: rgba(255,255,255,0.9);
    box-shadow: 0 2px 12px rgba(27,11,148,0.05);
  }
  .field input::placeholder {
    color: #8a7d6b;
    font-size: 12px;
    font-weight: 300;
  }

  .forgot {
    margin: 6px 0 24px;
    text-align: right;
    padding-right: 2px;
  }
  .forgot a {
    font-size: 10px;
    color: #1B0B94;
    text-decoration: none;
    letter-spacing: 0.03em;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .forgot a:hover { opacity: 1; }

  .btn-primary {
    width: 100%;
    height: 48px;
    background: #1B0B94;
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.4s;
  }
  .btn-primary:hover { background: #130970; }

  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 18px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(27,11,148,0.06);
  }
  .divider span {
    font-size: 10px;
    color: #8a7d6b;
    letter-spacing: 0.08em;
  }

  .btn-google {
    width: 100%;
    height: 46px;
    border: 1px solid rgba(27,11,148,0.08);
    border-radius: 8px;
    background: rgba(255,255,255,0.45);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.06em;
    color: #1a1510;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s;
  }
  .btn-google:hover {
    border-color: rgba(27,11,148,0.15);
    background: rgba(255,255,255,0.7);
  }
  .btn-google svg { width: 15px; height: 15px; }

  .register {
    margin-top: 24px;
    font-size: 12px;
    color: #5a4d3e;
    letter-spacing: 0.04em;
    font-weight: 300;
    text-align: center;
  }
  .register a {
    color: #1B0B94;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s;
  }
  .register a:hover { color: #B89547; }

  .bottom-deco {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .bottom-deco .line {
    width: 24px;
    height: 1px;
    background: rgba(184,149,71,0.15);
  }
  .bottom-deco .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(184,149,71,0.3);
  }
</style>
</head>
<body>

  <div class="top-line"></div>

  <div class="card">
    <div class="logo">Lolett</div>
    <div class="tagline">Mode du Sud-Ouest</div>

    <div class="separator"><div class="diamond"></div></div>

    <h1 class="title">Se connecter</h1>
    <p class="subtitle">Retrouvez votre espace personnel</p>

    <form onsubmit="return false">
      <div class="field">
        <label>Email</label>
        <input type="email" placeholder="vous@exemple.com" />
      </div>
      <div class="field">
        <label>Mot de passe</label>
        <input type="password" placeholder="••••••••" />
      </div>
      <div class="forgot">
        <a href="#">Mot de passe oublié ?</a>
      </div>
      <button type="button" class="btn-primary">Entrer</button>
    </form>

    <div class="divider"><span>ou</span></div>

    <button type="button" class="btn-google">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Connexion avec Google
    </button>

    <p class="register">Nouveau ? <a href="#">Créer un compte</a></p>
  </div>

  <div class="bottom-deco">
    <div class="line"></div>
    <div class="dot"></div>
    <div class="line"></div>
  </div>

</body>
</html>
