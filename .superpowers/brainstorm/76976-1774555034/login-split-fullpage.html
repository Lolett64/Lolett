<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOLETT — Login Split Screen (Preview)</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ═══ LEFT PANEL ═══ */
  .left {
    width: 42%;
    background: linear-gradient(160deg, #1B0B94 0%, #0a0550 60%, #07033a 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px 48px;
    position: relative;
    overflow: hidden;
  }

  .left::before {
    content: '';
    position: absolute;
    top: -40%;
    left: -30%;
    width: 160%;
    height: 160%;
    background: radial-gradient(circle at 25% 75%, rgba(184,149,71,0.12) 0%, transparent 50%);
    pointer-events: none;
  }

  .left::after {
    content: '';
    position: absolute;
    bottom: -20%;
    right: -20%;
    width: 80%;
    height: 80%;
    background: radial-gradient(circle, rgba(184,149,71,0.06) 0%, transparent 60%);
    pointer-events: none;
  }

  /* Thin gold lines */
  .corner-deco {
    position: absolute;
    width: 60px;
    height: 60px;
    pointer-events: none;
  }
  .corner-deco.tl { top: 32px; left: 32px; border-top: 1px solid rgba(184,149,71,0.2); border-left: 1px solid rgba(184,149,71,0.2); }
  .corner-deco.br { bottom: 32px; right: 32px; border-bottom: 1px solid rgba(184,149,71,0.2); border-right: 1px solid rgba(184,149,71,0.2); }

  .brand {
    position: relative;
    z-index: 1;
    text-align: center;
  }

  .brand-logo {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    letter-spacing: 0.3em;
    color: white;
    font-weight: 400;
    margin-bottom: 10px;
  }

  .brand-tagline {
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
  }

  .brand-divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #B89547, transparent);
    margin: 36px auto;
  }

  .brand-quote {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 16px;
    color: rgba(255,255,255,0.3);
    text-align: center;
    line-height: 1.8;
    max-width: 220px;
    font-weight: 400;
  }

  .brand-author {
    font-family: 'DM Sans', sans-serif;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(184,149,71,0.4);
    margin-top: 16px;
    text-align: center;
  }

  /* Bottom badge */
  .left-footer {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 1;
  }
  .left-footer span {
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.15);
  }

  /* ═══ RIGHT PANEL ═══ */
  .right {
    width: 58%;
    background: #FDF5E6;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 60px;
    position: relative;
  }

  .form-container {
    width: 100%;
    max-width: 380px;
  }

  .form-welcome {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    color: #1a1510;
    margin-bottom: 6px;
    font-weight: 400;
  }

  .form-subtitle {
    font-size: 13px;
    color: #8a7d6b;
    margin-bottom: 40px;
    font-weight: 300;
  }

  .field {
    margin-bottom: 24px;
  }

  .field label {
    display: block;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: #8a7d6b;
    margin-bottom: 10px;
    font-weight: 500;
  }

  .field input {
    width: 100%;
    height: 46px;
    border: none;
    border-bottom: 1px solid rgba(27,11,148,0.1);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: #1a1510;
    padding: 0 2px;
    outline: none;
    transition: border-color 0.3s;
  }
  .field input:focus {
    border-bottom-color: #1B0B94;
  }
  .field input::placeholder {
    color: rgba(27,11,148,0.18);
    font-weight: 300;
  }

  .forgot-row {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 32px;
  }
  .forgot-row a {
    font-size: 11px;
    color: #1B0B94;
    text-decoration: none;
    letter-spacing: 0.03em;
    font-weight: 400;
    transition: color 0.3s;
  }
  .forgot-row a:hover { color: #B89547; }

  .btn-primary {
    width: 100%;
    height: 50px;
    background: #1B0B94;
    color: white;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.4s;
  }
  .btn-primary:hover { background: #130970; }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 24px 0;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(27,11,148,0.06);
  }
  .divider span {
    font-size: 10px;
    color: rgba(27,11,148,0.25);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .btn-google {
    width: 100%;
    height: 48px;
    border: 1px solid rgba(27,11,148,0.1);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: #1B0B94;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: all 0.3s;
  }
  .btn-google:hover {
    background: rgba(27,11,148,0.03);
    border-color: rgba(27,11,148,0.2);
  }
  .btn-google svg { width: 16px; height: 16px; }

  .register-link {
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    color: #8a7d6b;
    font-weight: 300;
  }
  .register-link a {
    color: #1B0B94;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s;
  }
  .register-link a:hover { color: #B89547; }

  /* Right panel subtle decoration */
  .right-deco {
    position: absolute;
    bottom: 36px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
  }
  .right-deco .dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: rgba(184,149,71,0.3);
  }
  .right-deco .line {
    width: 20px;
    height: 1px;
    background: rgba(184,149,71,0.15);
  }
</style>
</head>
<body>

  <!-- LEFT: Brand Panel -->
  <div class="left">
    <div class="corner-deco tl"></div>
    <div class="corner-deco br"></div>

    <div class="brand">
      <div class="brand-logo">LOLETT</div>
      <div class="brand-tagline">Mode du Sud-Ouest</div>
      <div class="brand-divider"></div>
      <div class="brand-quote">
        « Le style, c'est savoir<br>qui on est, ce qu'on veut<br>dire, et s'en moquer. »
      </div>
      <div class="brand-author">— Gore Vidal</div>
    </div>

    <div class="left-footer">
      <span>Collection Été 2026</span>
    </div>
  </div>

  <!-- RIGHT: Form Panel -->
  <div class="right">
    <div class="form-container">
      <h1 class="form-welcome">Bienvenue</h1>
      <p class="form-subtitle">Connectez-vous à votre espace LOLETT</p>

      <form>
        <div class="field">
          <label for="email">Adresse email</label>
          <input id="email" type="email" placeholder="vous@exemple.com" />
        </div>

        <div class="field">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" placeholder="••••••••" />
        </div>

        <div class="forgot-row">
          <a href="#">Mot de passe oublié ?</a>
        </div>

        <button type="button" class="btn-primary">Se connecter</button>
      </form>

      <div class="divider"><span>ou</span></div>

      <button type="button" class="btn-google">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Connexion avec Google
      </button>

      <p class="register-link">
        Pas encore de compte ? <a href="#">Créer un compte</a>
      </p>
    </div>

    <div class="right-deco">
      <div class="line"></div>
      <div class="dot"></div>
      <div class="line"></div>
    </div>
  </div>

</body>
</html>
